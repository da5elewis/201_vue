<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- Brain/circuit icon -->
  <g transform="translate(100,95)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain outline -->
    <path d="M-8,-35 C-25,-35 -38,-22 -38,-8 C-38,0 -34,7 -28,11 C-32,16 -33,23 -28,30 C-22,38 -10,38 -4,34"/>
    <path d="M8,-35 C25,-35 38,-22 38,-8 C38,0 34,7 28,11 C32,16 33,23 28,30 C22,38 10,38 4,34"/>
    <line x1="0" y1="-35" x2="0" y2="34"/>
    <!-- Circuit nodes -->
    <circle cx="-20" cy="0" r="3" fill="#fff"/>
    <circle cx="20" cy="0" r="3" fill="#fff"/>
    <circle cx="-12" cy="-18" r="3" fill="#fff"/>
    <circle cx="12" cy="-18" r="3" fill="#fff"/>
    <circle cx="-12" cy="18" r="3" fill="#fff"/>
    <circle cx="12" cy="18" r="3" fill="#fff"/>
    <!-- Connection lines -->
    <line x1="-12" y1="-18" x2="-20" y2="0" opacity="0.6"/>
    <line x1="12" y1="-18" x2="20" y2="0" opacity="0.6"/>
    <line x1="-20" y1="0" x2="-12" y2="18" opacity="0.6"/>
    <line x1="20" y1="0" x2="12" y2="18" opacity="0.6"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="30" cy="30" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="170" cy="40" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="45" cy="165" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="160" cy="160" r="2.5" fill="#fff" opacity="0.5"/>
</svg>
